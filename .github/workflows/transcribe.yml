# ============================================================
#  Video to Subtitles — GitHub Actions Workflow
# ============================================================
#  Checks for new video at 4 specific Central Time windows:
#    • 10:50 AM CT  (video usually ready by here)
#    • 11:30 AM CT
#    • 12:00 PM CT
#    • 1:00  PM CT
#
#  DST-SAFE: Both CDT (UTC-5) and CST (UTC-6) UTC equivalents
#  are scheduled so this works year-round without manual edits.
#  A lightweight check step cancels early if the job fires at
#  an off-season UTC time that doesn't match a CT window.
#
#  CDT (UTC-5) active ~Mar–Nov:  15:50 | 16:30 | 17:00 | 18:00
#  CST (UTC-6) active ~Nov–Mar:  16:50 | 17:30 | 18:00 | 19:00
#  (18:00 UTC is shared — 1 PM CDT and 12 PM CST)
# ============================================================

name: Video to Subtitles

# Cancel any already-running instance before starting a new one.
# Prevents pile-up when GitHub delays cause back-to-back fires.
concurrency:
  group: video-to-subtitles
  cancel-in-progress: true

on:
  schedule:
    # ── CDT runs (UTC-5, ~Mar–Nov) ──────────────────────────
    - cron: '50 15 * * 1-5'   # 10:50 AM CDT
    - cron: '30 16 * * 1-5'   # 11:30 AM CDT
    - cron: '0  17 * * 1-5'   # 12:00 PM CDT

    # ── Shared: 1:00 PM CDT = 12:00 PM CST ─────────────────
    - cron: '0  18 * * 1-5'   # one entry handles both seasons

    # ── CST-only runs (UTC-6, ~Nov–Mar) ─────────────────────
    - cron: '50 16 * * 1-5'   # 10:50 AM CST
    - cron: '30 17 * * 1-5'   # 11:30 AM CST
    - cron: '0  19 * * 1-5'   # 1:00  PM CST

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # Safety ceiling only — transcription step has no timeout

    steps:
      # ── 1. Verify this run is within a valid CT check window ──
      #
      #  Tolerance is ±25 min to handle GitHub's known scheduling
      #  delays of up to ~30 min under heavy load.
      #
      #  workflow_dispatch always bypasses this check.
      - name: Check CT time window
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STEP 1/6 — Checking CT time window"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          OFFSET=$(python3 - <<'PYEOF'
          import datetime, zoneinfo
          now_ct = datetime.datetime.now(zoneinfo.ZoneInfo("America/Chicago"))
          print(int(now_ct.utcoffset().total_seconds() / 3600))
          PYEOF
          )

          UTC_H=$(date -u +"%H" | sed 's/^0//')
          UTC_M=$(date -u +"%M" | sed 's/^0//')
          UTC_MINS=$(( UTC_H * 60 + UTC_M ))
          CT_MINS=$(( UTC_MINS + OFFSET * 60 ))
          if [ $CT_MINS -lt 0 ]; then CT_MINS=$(( CT_MINS + 1440 )); fi

          CT_DISPLAY=$(printf '%02d:%02d' $(( CT_MINS / 60 )) $(( CT_MINS % 60 )))
          echo "  UTC now  : $(date -u +"%H:%M:%S")"
          echo "  CT offset: $OFFSET hrs  ($([ $OFFSET -eq -5 ] && echo 'CDT' || echo 'CST'))"
          echo "  CT time  : $CT_DISPLAY"
          echo ""

          # Target windows: 10:50=650 | 11:30=690 | 12:00=720 | 1:00=780
          TOLERANCE=25
          IN_WINDOW=0
          for TARGET in 650 690 720 780; do
            LOW=$(( TARGET - TOLERANCE ))
            HIGH=$(( TARGET + TOLERANCE ))
            if [ $CT_MINS -ge $LOW ] && [ $CT_MINS -le $HIGH ]; then
              IN_WINDOW=1
              case $TARGET in
                650) LABEL="10:50 AM CT" ;;
                690) LABEL="11:30 AM CT" ;;
                720) LABEL="12:00 PM CT" ;;
                780) LABEL="1:00 PM CT"  ;;
              esac
              echo "  ✅ Within valid window: $LABEL — proceeding."
              break
            fi
          done

          if [ $IN_WINDOW -eq 0 ]; then
            echo "  ⏭️  CT time $CT_DISPLAY is outside all check windows."
            echo "     (Off-season UTC cron firing — skipping cleanly.)"
            echo "SKIP_RUN=true" >> $GITHUB_ENV
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 2. Checkout ──────────────────────────────────────────
      - name: Checkout repo
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v4

      # ── 3. Python setup ──────────────────────────────────────
      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 4. System deps (ffmpeg) ──────────────────────────────
      - name: Install system dependencies (ffmpeg)
        if: env.SKIP_RUN != 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STEP 4/6 — Installing ffmpeg"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          echo "  ✅ ffmpeg $(ffmpeg -version 2>&1 | head -1 | awk '{print $3}')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 5. Python deps ───────────────────────────────────────
      - name: Install Python dependencies
        if: env.SKIP_RUN != 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STEP 5/6 — Installing Python dependencies"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pip install -r requirements.txt
          echo "  ✅ Dependencies installed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 6. Run the transcription bot ─────────────────────────
      #
      #  NO step-level timeout — transcription of long videos can
      #  take 30–90+ min. The 120-min job ceiling is the only limit.
      #
      #  EXIT CODE CONTRACT (main.py must follow this):
      #    exit 0  → success OR video not yet available (clean skip)
      #    exit 1+ → genuine unexpected error → GitHub sends ❌ email
      - name: Run transcription bot
        if: env.SKIP_RUN != 'true'
        env:
          GOOGLE_TOKEN_B64:           ${{ secrets.GOOGLE_TOKEN_B64 }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
          DRIVE_FOLDER_ID:            ${{ secrets.DRIVE_FOLDER_ID }}
          RECIPIENT_EMAIL:            ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STEP 6/6 — Running transcription bot"
          echo "  Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python main.py
          EXIT_CODE=$?
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          if [ $EXIT_CODE -eq 0 ]; then
            echo "  ✅ Transcription bot exited cleanly (exit 0)"
          else
            echo "  ❌ Transcription bot failed (exit $EXIT_CODE)"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit $EXIT_CODE
