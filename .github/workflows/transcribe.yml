# ============================================================
#  Video to Subtitles — GitHub Actions Workflow
# ============================================================
#  Runs every 30 minutes, Mon–Thu, 10:00 AM – 3:00 PM Central Time
#
#  Slots: 10:00 10:30 11:00 11:30 12:00 12:30 13:00 13:30 14:00 14:30 15:00
#         (11 checks per day × 4 days = 44 runs/week)
#
#  DST-SAFE: Both CDT (UTC-5) and CST (UTC-6) UTC equivalents are
#  scheduled year-round. A lightweight CT window check step cancels
#  the off-season UTC crons before doing any real work.
#
#  CDT (UTC-5, ~Mar–Nov):  15–20 UTC on the hour/half
#  CST (UTC-6, ~Nov–Mar):  16–21 UTC on the hour/half
#
#  No UTC times overlap between CDT and CST for this schedule,
#  so there are no shared entries — each cron is season-specific.
# ============================================================

name: Video to Subtitles

# Cancels any in-progress run when a new one starts.
# Prevents queue pile-up when GitHub delays cause back-to-back fires.
concurrency:
  group: video-to-subtitles
  cancel-in-progress: true

on:
  schedule:
    # ── CDT runs (UTC-5, ~Mar–Nov) ──  Mon–Thu only (1-4) ───
    - cron: ' 0 15 * * 1-4'   # 10:00 AM CDT
    - cron: '30 15 * * 1-4'   # 10:30 AM CDT
    - cron: ' 0 16 * * 1-4'   # 11:00 AM CDT
    - cron: '30 16 * * 1-4'   # 11:30 AM CDT
    - cron: ' 0 17 * * 1-4'   # 12:00 PM CDT
    - cron: '30 17 * * 1-4'   # 12:30 PM CDT
    - cron: ' 0 18 * * 1-4'   #  1:00 PM CDT
    - cron: '30 18 * * 1-4'   #  1:30 PM CDT
    - cron: ' 0 19 * * 1-4'   #  2:00 PM CDT
    - cron: '30 19 * * 1-4'   #  2:30 PM CDT
    - cron: ' 0 20 * * 1-4'   #  3:00 PM CDT

    # ── CST runs (UTC-6, ~Nov–Mar) ──  Mon–Thu only (1-4) ───
    - cron: ' 0 16 * * 1-4'   # 10:00 AM CST
    - cron: '30 16 * * 1-4'   # 10:30 AM CST
    - cron: ' 0 17 * * 1-4'   # 11:00 AM CST
    - cron: '30 17 * * 1-4'   # 11:30 AM CST
    - cron: ' 0 18 * * 1-4'   # 12:00 PM CST
    - cron: '30 18 * * 1-4'   # 12:30 PM CST
    - cron: ' 0 19 * * 1-4'   #  1:00 PM CST
    - cron: '30 19 * * 1-4'   #  1:30 PM CST
    - cron: ' 0 20 * * 1-4'   #  2:00 PM CST
    - cron: '30 20 * * 1-4'   #  2:30 PM CST
    - cron: ' 0 21 * * 1-4'   #  3:00 PM CST

  # Manual trigger — always bypasses the window check
  workflow_dispatch:

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Hard ceiling; step-level limit below fires first

    steps:
      # ── 1. Verify this run is within a valid CT check window ──
      #
      #  Because CDT and CST UTC times are both scheduled year-round,
      #  ~half the crons are "off-season" on any given day. This step
      #  checks the actual CT clock and cancels early if we're outside
      #  the 10:00 AM – 3:00 PM window.
      #
      #  Tolerance: ±20 min to absorb GitHub's scheduling lag (which
      #  can be 15–30 min under heavy load). With 30-min slots the
      #  windows safely overlap so no valid fire is ever dropped.
      #
      #  Valid CT range: 9:40 AM – 3:20 PM  (600 ±20 to 900 ±20)
      #  Since slots are every 30 min, a ±20 min band on each target
      #  means continuous coverage with no gaps.
      #
      #  workflow_dispatch always bypasses this check.
      - name: Check CT time window
        if: github.event_name != 'workflow_dispatch'
        run: |
          OFFSET=$(python3 - <<'PYEOF'
          import datetime, zoneinfo
          now_ct = datetime.datetime.now(zoneinfo.ZoneInfo("America/Chicago"))
          print(int(now_ct.utcoffset().total_seconds() / 3600))
          PYEOF
          )

          UTC_H=$(date -u +"%H" | sed 's/^0//')
          UTC_M=$(date -u +"%M" | sed 's/^0//')
          UTC_MINS=$(( UTC_H * 60 + UTC_M ))
          CT_MINS=$(( UTC_MINS + OFFSET * 60 ))
          if [ $CT_MINS -lt 0 ]; then CT_MINS=$(( CT_MINS + 1440 )); fi

          CT_DISPLAY=$(printf '%02d:%02d' $(( CT_MINS / 60 )) $(( CT_MINS % 60 )))
          echo "UTC now  : $(date -u +"%H:%M")"
          echo "CT offset: $OFFSET hrs"
          echo "CT time  : $CT_DISPLAY"

          # Targets: every 30 min from 10:00 AM (600) to 3:00 PM (900)
          TOLERANCE=25
          IN_WINDOW=0
          for TARGET in 600 630 660 690 720 750 780 810 840 870 900; do
            LOW=$(( TARGET - TOLERANCE ))
            HIGH=$(( TARGET + TOLERANCE ))
            if [ $CT_MINS -ge $LOW ] && [ $CT_MINS -le $HIGH ]; then
              IN_WINDOW=1
              LABEL=$(printf '%02d:%02d CT' $(( TARGET / 60 )) $(( TARGET % 60 )))
              echo "✅ Within valid window: $LABEL — proceeding."
              break
            fi
          done

          if [ $IN_WINDOW -eq 0 ]; then
            echo "⏭️  CT time $CT_DISPLAY is outside 10:00 AM–3:00 PM window."
            echo "   (Off-season UTC cron firing — skipping cleanly.)"
            echo "SKIP_RUN=true" >> $GITHUB_ENV
          fi

      # ── 2. Checkout ──────────────────────────────────────────
      - name: Checkout repo
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v4

      # ── 3. Python setup ──────────────────────────────────────
      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 4. System deps (ffmpeg) ──────────────────────────────
      - name: Install system dependencies (ffmpeg)
        if: env.SKIP_RUN != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── 5. Python deps ───────────────────────────────────────
      - name: Install Python dependencies
        if: env.SKIP_RUN != 'true'
        run: pip install -r requirements.txt

      # ── 6. Run the transcription bot ─────────────────────────
      #
      #  Step timeout: 55 min. Transcription of long videos can take 30+ min.
      #  starts clean. The 60-min job ceiling is a safety net only.
      #
      #  EXIT CODE CONTRACT (main.py must follow this):
      #    exit 0  → success OR video not yet available (clean skip)
      #    exit 1+ → genuine unexpected error → GitHub sends ❌ email
      - name: Run transcription bot
        if: env.SKIP_RUN != 'true'
        timeout-minutes: 120
        env:
          GOOGLE_TOKEN_B64:           ${{ secrets.GOOGLE_TOKEN_B64 }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
          DRIVE_FOLDER_ID:            ${{ secrets.DRIVE_FOLDER_ID }}
          RECIPIENT_EMAIL:            ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py
